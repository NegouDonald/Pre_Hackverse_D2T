services:

  backend:
    container_name: smarttimebackend
    build: ./backend
    restart: always
    ports:
      - "8020:8000"
    depends_on:
      - postgres
    networks:
      - ntanet

  frontend:
    container_name: smarttimefront
    build: ./frontend
    restart: always
    networks:
      - ntanet

  postgres:
    container_name: postgres_server
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: smarttime
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smarttimedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ntanet

volumes:
  postgres_data:

networks:
  ntanet:
    driver: bridge
